{% extends 'base.html' %}

{% block title %}Collectors{% endblock %}


{% block externalCSS %}
<style>
    input.no-spinners::-webkit-outer-spin-button,
    input.no-spinners::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input.no-spinners {
        -moz-appearance: textfield;
    }
</style>
{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-4 text-gray-700">Update Collectors</h1>
<div class="bg-white shadow rounded-xl p-6 ">
    <form method="post" action="{% url 'edit-collector' collector.id %}"> 
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700">Name*</label>
                <input type="text" name="name" value="{{ collector.name }}" class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
              <div>
                <label class="block text-gray-700">Address</label>
                <input type="text" name="address" value="{{ collector.address }}" class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" >
            </div>
            <div>
                <label class="block text-gray-700">Phone*</label> 
                <input type="number" name="phone" value="{{ collector.phone }}" 
                class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners" required
                oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                >
            </div>
        </div>
        <div class="mt-6">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Update Colelctor</button>
        </div>
    </form>
</div>

{% endblock %}  
{% block externalJS %}
<script>

  navActive("collectorMasterLink");
</script>
{% endblock %}
