{% extends "base.html" %}

{% block title %}
    View Collections
{% endblock title %}

{% block content %}
<div class="bg-white rounded-xl p-6 mt-3">
    <h1 class="text-2xl font-medium mb-0 text-gray-700 uppercase">
        View Collections
    </h1>

    <p class="text-sm text-gray-500 mt-2">
    </p>

    <hr class="mt-5">

    <div id="createView" class="mt-5 w-full">
        <div class="grid grid-cols-8 gap-4">
            <div class="col-span-6 w-full flex items-center gap-3">
                <div class="w-[45%]">
                    <div class="flex items-center gap-4 w-full">
                        <div class="flex-1">
                            <label class="block text-gray-700 mb-1">Collector*</label>
                            <select
                                id="supplierSelect"
                                class="w-full bg-white px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                                required>
                                <option value="" selected>Select Collector</option>
                                {% for supplier in suppliers %}
                                <option
                                    value="{{ supplier.id }}"
                                    data-code="{{ supplier.supplierId }}"
                                    data-balance="{{ supplier.balance }}"
                                    data-type="suppliers">
                                    {{ supplier.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <div class="w-[20%]">
                    <div class="flex items-end gap-4 w-full">
                        <div class="flex-1">
                            <label class="block text-gray-700 mb-1">C.code</label>
                            <input type="text"
                                id="supplierID"
                                disabled
                                class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-6 w-full flex items-center gap-3">
                <div class="w-[20%]">
                    <label class="block text-gray-700 mb-1">From*</label>
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <input type="date"
                                id="dateFrom"
                                class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                                required>
                        </div>
                    </div>
                </div>

                <div class="w-[20%]">
                    <label class="block text-gray-700 mb-1">To*</label>
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <input type="date"
                                id="dateTo"
                                class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                                required>
                        </div>
                    </div>
                </div>

                <div class="w-[25%]">
                    <label class="block text-gray-700 mb-1">Sort Order*</label>
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <select
                                id="sortOrder"
                                class="w-full bg-white px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                                required>
                                <option value="" selected>Sort By</option>
                                {% for supplier in suppliers %}
                                <option value="{{ supplier.id }}">
                                    {{ supplier.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-8 w-full flex items-center gap-3">
                <div class="w-full">
                    <div class="flex items-center gap-4">
                        <div class="w-full flex items-center justify-between">
                            <div class="flex gap-2">
                                <a id="btnClear"
                                    href="#"
                                    class="leading-none inline-flex items-center gap-1.5 bg-gray-500 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-sm hover:bg-gray-600 transition-all duration-300">
                                    Clear Details
                                </a>
                                <a id="btnView"
                                    href="#"
                                    class="leading-none inline-flex items-center gap-1.5 bg-blue-500 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-sm hover:bg-blue-600 transition-all duration-300">
                                    View Results
                                </a>
                            </div>
                            <div class="relative w-[20%] ">
                                <input type="text"
                                    id="searchInput"
                                    placeholder="Search Collection..."
                                    class="w-full bg-white rounded-xl px-4 py-2 pl-10 border  focus:border-transparent ring-2 ring-blue-200  focus:ring-2 focus:ring-blue-300 transition-all duration-200 outline-none" />
                                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5 pointer-events-none"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1010.5 3a7.5 7.5 0 006.15 13.65z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto mt-5 w-full col-span-8">
                <table id="viewPurchaseTable"
                    class="w-full min-w-max rounded-t-lg overflow-hidden">
                    <thead class="bg-blue-200 text-gray-700 uppercase text-sm">
                        <tr>
                            <th class="px-4 py-3 text-left font-medium w-1">Actions</th>
                            <th class="px-4 py-3 text-left font-medium w-1">#</th>
                            <th class="px-4 py-3 text-left font-medium">Purchase No</th>
                            <th class="px-4 py-3 text-left font-medium">Date</th>
                            <th class="px-4 py-3 text-left font-medium">Supplier</th>
                            <th class="px-4 py-3 text-left font-medium">Godown</th>
                            <th class="px-4 py-3 text-right font-medium">Qty</th>
                            <th class="px-4 py-3 text-right font-medium">Rate</th>
                            <th class="px-4 py-3 text-right font-medium">Total Amount</th>
                            <th class="px-4 py-3 text-right font-medium">Description</th>
                        </tr>
                    </thead>
                    <tbody id="purchaseTableBody" class="bg-gray-100"></tbody>
                </table>
            </div>

        </div>
    </div>
</div>
{% endblock content %}

{% block externalJS %}
<script>
    navActive("supplierMasterLink");

    let deleteUrl = "";

    function openEditModal(supplierId) {
        const url = "{% url 'edit-supplier' 0 %}".replace("0", supplierId);
        document.getElementById("confirmEditBtn").setAttribute("href", url);
        document.getElementById("editModal").classList.remove("hidden");
    }

    function closeEditModal() {
        document.getElementById("editModal").classList.add("hidden");
    }

    function openModal(supplierId) {
        deleteUrl = "{% url 'delete-supplier' 0 %}".replace("0", supplierId);
        document.getElementById("confirmDeleteBtn").setAttribute("href", deleteUrl);
        document.getElementById("confirmModal").classList.remove("hidden");
    }

    function closeModal() {
        document.getElementById("confirmModal").classList.add("hidden");
    }
</script>
{% endblock externalJS %}
