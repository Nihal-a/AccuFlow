{% extends 'base.html' %}

{% block title %}Update Client{% endblock %}

{% block externalCSS %}
<style>
  input.no-spinners::-webkit-outer-spin-button,
  input.no-spinners::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input.no-spinners {
    -moz-appearance: textfield;
  }
  .password-strength {
    height: 6px;
    border-radius: 4px;
    background-color: #ddd;
    margin-top: 4px;
  }
  .strength-weak { background-color: red; width: 33%; }
  .strength-medium { background-color: orange; width: 66%; }
  .strength-strong { background-color: green; width: 100%; }
</style>
{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-4 text-gray-700">Update Client</h1>

<div class="bg-white rounded-xl p-6">
  <form method="post" action="{% url 'update-client' client.id %}">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700">Name*</label>
        <input type="text" name="name" value="{{ client.name }}" 
               class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
               required>
      </div>
      <div>
        <label class="block text-gray-700">Email</label>
        <input type="email" name="email" value="{{ client.email }}"
               class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-gray-700">Phone</label>
        <input type="number" name="phone" value="{{ client.phone }}"
               class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners">
      </div>
      <div>
        <label class="block text-gray-700">Whatsapp No.</label>
        <div class="flex mt-1">
          <select name="country_code" id="countryCode"
                  class="border rounded-l-xl px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </select>
          <input type="tel" name="wa" value="{{ client.wa|default:'' }}"
                 class="w-full px-3 py-2 border-t border-b border-r rounded-r-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners"
                 inputmode="numeric" pattern="[0-9]*"
                 oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
      </div>
      <div>
        <label class="block text-gray-700">Username*</label>
        <input type="text" id="username" name="username" value="{{ user.username }}"
               class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
               required>
        <p id="username-status" class="text-sm mt-1"></p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-gray-700">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password"
                   placeholder="Leave blank to keep existing password"
                   class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" onclick="togglePassword('password')" 
                    class="absolute right-3 top-2 text-gray-400">👁️</button>
          </div>
          <div id="password-strength" class="password-strength"></div>
        </div>
        <div>
          <label class="block text-gray-700">Confirm Password</label>
          <div class="relative">
            <input type="password" id="confirm_password" name="confirm_password"
                   class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" onclick="togglePassword('confirm_password')" 
                    class="absolute right-3 top-2 text-gray-400">👁️</button>
          </div>
          <p id="password-match" class="text-sm mt-1"></p>
        </div>
      </div>
    </div>

    <div class="mt-6 flex gap-2 justify-end">
      <a href="{% url 'clients' %}" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 font-semibold">Cancel</a>
      <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 font-semibold">Update Client</button>
    </div>
  </form>
</div>
{% endblock %}

{% block externalJS %}
<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }

  const password = document.getElementById("password");
  const confirmPassword = document.getElementById("confirm_password");
  const passwordMatch = document.getElementById("password-match");

  function validatePasswordMatch() {
    if (!password.value && !confirmPassword.value) {
      passwordMatch.textContent = "";
      return;
    }
    if (password.value === confirmPassword.value) {
      passwordMatch.textContent = "✅ Passwords match";
      passwordMatch.className = "text-green-600 text-sm mt-1";
    } else {
      passwordMatch.textContent = "❌ Passwords do not match";
      passwordMatch.className = "text-red-600 text-sm mt-1";
    }
  }
  password.addEventListener("input", validatePasswordMatch);
  confirmPassword.addEventListener("input", validatePasswordMatch);

  const strengthBar = document.getElementById("password-strength");
  password.addEventListener("input", function () {
    const val = password.value;
    let strength = 0;
    if (val.length > 6) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    strengthBar.className = "password-strength";
    if (strength <= 1 && val) strengthBar.classList.add("strength-weak");
    else if (strength === 2) strengthBar.classList.add("strength-medium");
    else if (strength >= 3) strengthBar.classList.add("strength-strong");
  });

  const usernameInput = document.getElementById("username");
  const usernameStatus = document.getElementById("username-status");
  usernameInput.addEventListener("input", async function () {
    const username = this.value.trim();
    if (!username) {
      usernameStatus.textContent = "";
      return;
    }
    const response = await fetch("{% url 'check-username' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}",
      },
      body: JSON.stringify({ username }),
    });
    const data = await response.json();
    if (data.exists && username !== "{{ user.username }}") {
      usernameStatus.textContent = "❌ Username already taken";
      usernameStatus.className = "text-red-600 text-sm mt-1";
    } else {
      usernameStatus.textContent = "✅ Username available";
      usernameStatus.className = "text-green-600 text-sm mt-1";
    }
  });

  countryCode();
</script>
{% endblock %}
