{% extends 'base.html' %}

{% block title %}Expenses{% endblock %}

{% block externalCSS %}
<style>
    /* Remove number input arrows */
    input.no-spinners::-webkit-outer-spin-button,
    input.no-spinners::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input.no-spinners {
        -moz-appearance: textfield;
    }
</style>
{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-4 text-gray-700">Create Expense</h1>
<div class="bg-white rounded-xl p-6  ">
    <form method="post" action="{% url 'create-expense' %}">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700">Name*</label>
                <input type="text" placeholder="Enter expense name..." name="name" class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">Description</label>
                <input type="text" placeholder="Enter expense description..." name="description" class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        <div class="mt-6">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600">Create Expense</button>
        </div>
    </form>
</div>  
{% endblock %}

 {% block externalJS %}
<script>
  navActive("expenseMasterLink");
</script>
{% endblock %}
