{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <link
      href="https://unpkg.com/tailwindcss@^2.0/dist/tailwind.min.css"
      rel="stylesheet"
    />
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white bg-opacity-90 backdrop-blur-sm shadow-lg rounded-2xl w-full max-w-xl p-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Accu flow</h1>
        <p class="text-gray-600 mb-6">Please enter your username and password to login!</p>

        <form action="{% url 'login' %}" method="post" class="text-left">  
            {% csrf_token %}
            <div class="mb-4">
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" 
                       placeholder="Enter your username" required>
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500" 
                       placeholder="Enter your password" required>
            </div>

            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-500 text-white font-semibold py-2 rounded-md transition duration-200">
                Log In
            </button>
        </form>
    </div>
</body>
</html>
