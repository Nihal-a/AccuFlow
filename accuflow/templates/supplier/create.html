{% extends 'base.html' %}

{% block title %}Suppliers{% endblock %}

{% block externalCSS %}
{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-4 text-gray-700">Create Supplier</h1>
<div class="bg-white shadow rounded-lg p-6">
    <form method="post" action="{% url 'create-supplier' %}">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700">Name</label>
                <input type="text" name="name" class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">Phone</label> 
                <input type="text" name="phone" class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">Address</label>
                <input type="text" name="address" class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">Open Credit</label>
                <input type="number" step="0.01" name="open_credit" class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">Open Debit</label>
                <input type="number" step="0.01" name="open_debit"
                    class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">OTC Credit</label>
                <input type="number" step="0.01" name="otc_credit" class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-gray-700">OTC Debit</label>
                <input type="number" step="0.01" name="otc_debit"
                    class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>
        <div class="mt-6">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Create Supplier</button>
        </div>
    </form>
</div>  


{% endblock %}
{% block externalJS %}
{% endblock %}
