# AccuFlow WhatsApp Integration - Docker Compose
# Usage:
#   docker-compose up -d          # Start both services
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop all

version: '3.8'

services:
  whatsapp:
    build:
      context: ./wn
      dockerfile: Dockerfile
    ports:
      - "${NODE_PORT:-3001}:3001"
    env_file:
      - ./wn/.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NODE_PORT=3001
      - DJANGO_ORIGIN=http://django:8000
    volumes:
      - whatsapp_auth:/app/auth_info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  django:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./accuflow/.env
    environment:
      - WHATSAPP_NODE_URL=http://whatsapp:3001
    depends_on:
      whatsapp:
        condition: service_healthy
    restart: unless-stopped

volumes:
  whatsapp_auth:
    driver: local
