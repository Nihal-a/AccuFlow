{% extends 'base.html' %}

{% block title %}Godown{% endblock %}

{% block externalCSS %}{% endblock %}

{% block content %}
<div class="bg-white sm:rounded-xl p-4 sm:p-6 mt-3 sm:mt-5 w-full max-w-full font-sans">
  <div class="flex items-center justify-between border-b border-gray-200 pb-4 mb-4 sm:mb-5">
    <h1 class="text-xl sm:text-2xl font-medium text-gray-700 uppercase">View Godown</h1>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Name</label>
      <input type="text" value="{{ godown.name }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Address</label>
      <input type="text" value="{{ godown.address }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Phone</label>
      <input type="text" value="{{ godown.phone }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">WhatsApp Number</label>
      <div class="flex">
        <input type="text" value="{{ godown.country_code | default:'' }}"
          class="w-16 bg-gray-50 px-2 h-[32px] sm:h-[34px] border border-gray-300 rounded-l-md text-xs sm:text-sm text-gray-600 focus:outline-none text-center cursor-not-allowed"
          disabled readonly>
        <input type="text" value="{{ godown.wa | default:'' }}"
          class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border-t border-b border-r border-gray-300 rounded-r-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
          disabled readonly>
      </div>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Open Credit</label>
      <input type="text" value="{{ godown.open_credit }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Open Debit</label>
      <input type="text" value="{{ godown.open_debit }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">OTC Credit</label>
      <input type="text" value="{{ godown.otc_credit }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
    <div>
      <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">OTC Debit</label>
      <input type="text" value="{{ godown.otc_debit }}"
        class="w-full bg-gray-50 px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md text-xs sm:text-sm text-gray-600 focus:outline-none cursor-not-allowed"
        disabled readonly>
    </div>
  </div>
  <div class="mt-4 sm:mt-6 flex justify-end">
    <a href="{% url 'godown' %}"
      class="leading-none inline-flex items-center gap-1.5 bg-gray-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-gray-600 transition-all duration-300 text-xs sm:text-sm">
      Back to Godowns
    </a>
  </div>
</div>
{% endblock %}

{% block externalJS %}
<script>
    navActive("godownMasterLink");
</script>
{% endblock %}
