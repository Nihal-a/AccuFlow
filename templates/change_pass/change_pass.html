{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="bg-white rounded-xl p-6 mt-3 shadow-sm border border-gray-100">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-gray-100 pb-4">
    <h1 class="text-2xl font-medium mb-0 text-gray-700 uppercase">Change Password</h1>
  </div>

  <div class="w-full max-w-xl">
    <form action="{% url 'changepass' %}" method="post" class="text-left">
      {% csrf_token %}
      <div class="mb-3 sm:mb-4">
        <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Current Password*</label>
        <div class="relative">
          <input type="password" id="password1" name="currentpassword" placeholder="Enter Password"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm pr-10"
            required />

          <button type="button" id="toggle1" tabindex="-1" class="absolute right-3 top-3 text-gray-500">
            <svg id="eye1Open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

            <svg id="eye1Closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" class="w-5 h-5 hidden">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 3l18 18M10.477 10.477A2.997 2.997 0 0012 9a3 3 0 012.829 2.12M9.88 14.121A2.996 2.996 0 0012 15a3 3 0 002.12-.879M6.343 6.343C4.499 7.87 3.29 9.814 2.458 12c1.274 4.057 5.065 7 9.542 7a9.97 9.97 0 005.657-1.757" />
            </svg>
          </button>

        </div>
      </div>

      <div class="mb-3 sm:mb-4">
        <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">New Password*</label>
        <div class="relative">
          <input type="password" id="password2" name="newpassword" placeholder="Enter New Password"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm pr-10"
            required />
          <button type="button" id="toggle2" tabindex="-1" class="absolute right-3 top-3 text-gray-500">
            <svg id="eye2Open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <svg id="eye2Closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" class="w-5 h-5 hidden">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 3l18 18M10.477 10.477A2.997 2.997 0 0012 9a3 3 0 012.829 2.12M9.88 14.121A2.996 2.996 0 0012 15a3 3 0 002.12-.879M6.343 6.343C4.499 7.87 3.29 9.814 2.458 12c1.274 4.057 5.065 7 9.542 7a9.97 9.97 0 005.657-1.757" />
            </svg>
          </button>
        </div>
        <small id="passwordStrength" class="text-xs"></small>
      </div>

      <div class="mb-3 sm:mb-4">
        <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Confirm Password*</label>
        <div class="relative">
          <input type="password" id="password3" name="confirmpassword" placeholder="Enter Password"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm pr-10"
            required />
          <button type="button" id="toggle3" tabindex="-1" class="absolute right-3 top-3 text-gray-500">
            <svg id="eye3Open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <svg id="eye3Closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" class="w-5 h-5 hidden">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 3l18 18M10.477 10.477A2.997 2.997 0 0012 9a3 3 0 012.829 2.12M9.88 14.121A2.996 2.996 0 0012 15a3 3 0 002.12-.879M6.343 6.343C4.499 7.87 3.29 9.814 2.458 12c1.274 4.057 5.065 7 9.542 7a9.97 9.97 0 005.657-1.757" />
            </svg>
          </button>
        </div>
        <small id="passwordMatch" class="text-xs"></small>
      </div>

      <div class="mt-4 sm:mt-6 flex gap-2 justify-end">
        <button type="button" onclick="history.back()"
          class="leading-none inline-flex items-center justify-center gap-1.5 bg-gray-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-gray-600 transition-all duration-300 text-xs sm:text-sm flex-1 sm:flex-none sm:w-auto">
          Discard
        </button>
        <button type="submit" id="submitBtn"
          class="leading-none inline-flex items-center justify-center gap-1.5 bg-blue-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-blue-600 transition-all duration-300 text-xs sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed flex-1 sm:flex-none sm:w-auto">
          Apply Changes
        </button>
      </div>

    </form>
  </div>
</div>
{% endblock %}

{% block externalJS %}
<script>
  const password2 = document.getElementById("password2");
  const password3 = document.getElementById("password3");
  const passwordStrength = document.getElementById("passwordStrength");
  const passwordMatch = document.getElementById("passwordMatch");
  const submitBtn = document.getElementById("submitBtn");

  let isPValid = false;
  let isPMatch = false;

  function validate() {
    submitBtn.disabled = !(isPValid && isPMatch);
  }

  password2.addEventListener("input", function () {
    const val = this.value;
    const commonPasswords = ["12345678", "password", "qwertyui", "123456789", "11223344"];

    let strength = '', color = 'text-red-500';
    isPValid = false;

    if (val.length === 0) {
      strength = '';
    } else if (val.length < 8) {
      strength = 'Too Short (Min 8 characters)'; color = 'text-red-500';
    } else if (/^\d+$/.test(val)) {
      strength = 'This password is entirely numeric.'; color = 'text-red-500';
    } else if (commonPasswords.includes(val.toLowerCase())) {
      strength = 'This password is too common.'; color = 'text-red-500';
    } else {
      isPValid = true;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val) && /\d/.test(val) && /[@$!%*?&#]/.test(val)) {
        strength = 'Strong password'; color = 'text-green-600';
      } else {
        strength = 'Medium password'; color = 'text-yellow-500';
      }
    }

    passwordStrength.textContent = strength;
    passwordStrength.className = 'text-xs ' + color;

    isPMatch = password3.value === val && val.length > 0;
    validate();
  });

  password3.addEventListener("input", function () {
    const val = this.value;
    if (val === password2.value && val.length > 0) {
      passwordMatch.textContent = "✅ Passwords match";
      passwordMatch.className = "text-green-600 text-xs";
      isPMatch = true;
    } else {
      passwordMatch.textContent = "❌ Passwords do not match";
      passwordMatch.className = "text-red-600 text-xs";
      isPMatch = false;
    }
    validate();
  });

  function setupToggle(btnId, inputId, eyeOpenId, eyeClosedId) {
    document.getElementById(btnId).onclick = function () {
      const input = document.getElementById(inputId);
      const openEye = document.getElementById(eyeOpenId);
      const closedEye = document.getElementById(eyeClosedId);

      if (input.type === "password") {
        input.type = "text";
        openEye.classList.add("hidden");
        closedEye.classList.remove("hidden");
      } else {
        input.type = "password";
        closedEye.classList.add("hidden");
        openEye.classList.remove("hidden");
      }
    };
  }

  setupToggle("toggle1", "password1", "eye1Open", "eye1Closed");
  setupToggle("toggle2", "password2", "eye2Open", "eye2Closed");
  setupToggle("toggle3", "password3", "eye3Open", "eye3Closed");

  validate();
</script>
{% endblock %}
