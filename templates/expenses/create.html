{% extends 'base.html' %}

{% block title %}Expenses{% endblock %}

{% block externalCSS %}
<style>
    input.no-spinners::-webkit-outer-spin-button,
    input.no-spinners::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input.no-spinners {
        -moz-appearance: textfield;
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-white sm:rounded-xl p-4 sm:p-6 mt-3 sm:mt-5 w-full max-w-full font-sans">
  <div class="flex flex-col flex-wrap border-b border-gray-200 pb-4">
    <h1 class="text-xl sm:text-2xl font-medium mb-0 text-gray-700 uppercase">Create Expense</h1>
  </div>
  <div class="mt-4 sm:mt-5 w-full">
    <form method="post" action="{% url 'create-expense' %}" class="flex flex-col gap-3 sm:gap-4">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Name*</label>
                <input type="text" placeholder="Enter expense name..." name="name"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm input-text-only"
                    required>
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Description</label>
                <input type="text" placeholder="Enter expense description..." name="description"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm">
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Amount</label>
                <input type="number" step="0.01" placeholder="Enter expense amount..." name="amount"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners">
            </div>
        </div>
        <div class="mt-4 sm:mt-6 flex flex-wrap gap-2 justify-end">
            <a href="{% url 'expenses'%}"
                class="leading-none inline-flex items-center gap-1.5 bg-red-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-red-600 transition-all duration-300 text-xs sm:text-sm">Cancel</a>
            <button type="submit"
                class="leading-none inline-flex items-center gap-1.5 bg-blue-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-blue-600 transition-all duration-300 text-xs sm:text-sm">Create Expense</button>
        </div>
    </form>
  </div>
</div>
{% endblock %}

{% block externalJS %}
<script>
    navActive("expenseMasterLink");
</script>
{% endblock %}
