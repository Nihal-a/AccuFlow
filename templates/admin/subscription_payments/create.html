{% extends 'base.html' %}

{% block title %}
New Subscription Payment
{% endblock title %}

{% block content %}
<div class="bg-white sm:rounded-xl p-4 sm:p-6 mt-3 sm:mt-5 w-full max-w-full font-sans">
    <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-4">Record New Payment</h2>

    <form method="POST" action="{% url 'payment-create' %}">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Client</label>
                <select name="client_id" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>Select Client</option>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.name }} ({{ client.user.username }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subscription Plan</label>
                    <select name="plan_id" id="planSelect" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled selected>Select Plan</option>
                        {% for plan in plans %}
                        <option value="{{ plan.id }}">{{ plan.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
                    <input type="number" name="amount" id="amountInput" step="0.01" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="0.00">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Transaction ID / Reference</label>
                <input type="text" name="transaction_id"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Optional">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Payment Method</label>
                <select name="payment_method"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="UPI">UPI</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="flex items-center mt-4">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_renewal" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600">
                    </div>
                    <span class="ml-3 text-sm font-medium text-gray-700">Is this a Renewal? (Leave unchecked for New
                        Client)</span>
                </label>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <a href="{% url 'payments' %}"
                    class="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">Cancel</a>
                <button type="submit"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">Save
                    Payment</button>
            </div>
        </div>
    </form>
</div>

{% endblock content %}

{% block externalJS %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const planSelect = document.getElementById('planSelect');
        const amountInput = document.getElementById('amountInput');

        planSelect.addEventListener('change', function () {
            const planId = this.value;
            if (planId) {
                // Fetch plan details
                fetch(`/api/get-plan-details/${planId}/`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.price !== undefined) {
                            amountInput.value = data.price;
                        }
                    })
                    .catch(error => console.error('Error fetching plan price:', error));
            } else {
                amountInput.value = '';
            }
        });
    });
</script>
{% endblock externalJS %}
