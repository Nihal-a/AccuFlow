{% extends 'base.html' %}

{% block title %}Update Client{% endblock %}

{% block externalCSS %}
<style>
  input.no-spinners::-webkit-outer-spin-button,
  input.no-spinners::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input.no-spinners {
    -moz-appearance: textfield;
  }

  .password-strength {
    height: 6px;
    border-radius: 4px;
    background-color: #ddd;
    margin-top: 4px;
  }

  .strength-weak {
    background-color: red;
    width: 33%;
  }

  .strength-medium {
    background-color: orange;
    width: 66%;
  }

  .strength-strong {
    background-color: green;
    width: 100%;
  }
</style>
{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-4 text-gray-700">Update Client</h1>

<div class="bg-white rounded-xl p-6">
  <form method="post" action="{% url 'update-client' client.id %}">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700">Name*</label>
        <input type="text" name="name" value="{{ client.name }}"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 input-text-only"
          required>
      </div>
      <div>
        <label class="block text-gray-700">Email</label>
        <input type="email" name="email" value="{{ client.email }}"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-gray-700">Phone</label>
        <input type="number" name="phone" value="{{ client.phone }}"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners input-number-only">
      </div>
      <div>
        <label class="block text-gray-700">Whatsapp No.</label>
        <div class="flex mt-1">
          <select name="country_code" id="countryCode"
            class="w-[40%] border rounded-l-xl px-1 sm:px-2 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
          </select>
          <input type="tel" name="wa" value="{{ client.wa|default:'' }}"
            class="w-[60%] px-3 py-2 border-t border-b border-r rounded-r-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners input-number-only"
            inputmode="numeric" pattern="[0-9]*">
        </div>
      </div>
      <div>
        <label class="block text-gray-700">Subscription Plan</label>
        <select name="subscription_plan" id="subscriptionPlan"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Select a Plan...</option>
          {% for plan in subscription_plans %}
          <option value="{{ plan.id }}">
            {{ plan.name }} ({{ plan.duration_days }} days){% if plan.is_trial %} [TRIAL]{% endif %}
          </option>
          {% endfor %}
        </select>
        <input type="number" name="custom_duration" placeholder="Custom Days (Optional)"
          class="w-full mt-2 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm input-number-only"
          title="Override plan duration">
      </div>
      <div>
        <label class="block text-gray-700">Username*</label>
        <input type="text" id="username" name="username" value="{{ user.username }}"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        <p id="username-status" class="text-sm mt-1"></p>
      </div>
      <div>
        <label class="block text-gray-700">WhatsApp Automation</label>
        <div class="flex items-center space-x-2 mt-3">
          <input type="checkbox" name="has_whatsapp_access" id="has_whatsapp_access" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" {% if client.has_whatsapp_access %}checked{% endif %}>
          <label for="has_whatsapp_access" class="text-sm text-gray-700">Enable WhatsApp Automation features</label>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-gray-700">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" placeholder="Leave blank to keep existing password"
              class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" onclick="togglePassword('password')"
              class="absolute right-3 top-2 text-gray-400">👁️</button>
          </div>
          <div id="password-strength" class="password-strength"></div>
        </div>
        <div>
          <label class="block text-gray-700">Confirm Password</label>
          <div class="relative">
            <input type="password" id="confirm_password" name="confirm_password"
              class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" onclick="togglePassword('confirm_password')"
              class="absolute right-3 top-2 text-gray-400">👁️</button>
          </div>
          <p id="password-match" class="text-sm mt-1"></p>
        </div>
      </div>
    </div>

    <div class="mt-6 flex gap-2 justify-end">
      <a href="{% url 'clients' %}"
        class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 font-semibold">Cancel</a>
      <button type="submit" id="submitBtn"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 font-semibold disabled:opacity-50 disabled:cursor-not-allowed">Update
        Client</button>
    </div>
  </form>
</div>
{% endblock %}

{% block externalJS %}
<script>
const submitBtn = document.getElementById('submitBtn');
let isUsernameValid = true; // Initialized as true since it's an existing user
let isPasswordValid = true; // Initialized as true since it's optional
let isPasswordMatch = true; // Initialized as true since it's optional

function validateForm() {
submitBtn.disabled = !(isUsernameValid && isPasswordValid && isPasswordMatch);
}

$(document).ready(function () {
{% if client.subscription_plan %}
$('#subscriptionPlan').val('{{ client.subscription_plan.id }}');
{% endif %}
validateForm();
});

function togglePassword(id) {
const input = document.getElementById(id);
input.type = input.type === "password" ? "text" : "password";
}

const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirm_password");
const passwordMatch = document.getElementById("password-match");
const strengthBar = document.getElementById("password-strength");

function validatePasswords() {
const pVal = passwordInput.value;
const cpVal = confirmPasswordInput.value;

if (!pVal && !cpVal) {
isPasswordValid = true;
isPasswordMatch = true;
passwordMatch.textContent = "";
strengthBar.className = "password-strength";
} else {
isPasswordValid = pVal.length >= 6;
isPasswordMatch = pVal === cpVal;

if (isPasswordMatch) {
passwordMatch.textContent = "✅ Passwords match";
passwordMatch.className = "text-green-600 text-sm mt-1";
} else if (cpVal) {
passwordMatch.textContent = "❌ Passwords do not match";
passwordMatch.className = "text-red-600 text-sm mt-1";
} else {
passwordMatch.textContent = "";
}

// Strength logic
let strength = 0;
if (pVal.length > 6) strength++;
if (/[A-Z]/.test(pVal)) strength++;
if (/[0-9]/.test(pVal)) strength++;
if (/[^A-Za-z0-9]/.test(pVal)) strength++;

strengthBar.className = "password-strength";
if (strength <= 1 && pVal) strengthBar.classList.add("strength-weak"); else if (strength===2)
  strengthBar.classList.add("strength-medium"); else if (strength>= 3) strengthBar.classList.add("strength-strong");
  }
  validateForm();
  }

  passwordInput.addEventListener("input", validatePasswords);
  confirmPasswordInput.addEventListener("input", validatePasswords);

  const usernameInput = document.getElementById("username");
  const usernameStatus = document.getElementById("username-status");

  usernameInput.addEventListener("input", async function () {
  const username = this.value.trim();
  if (username.length < 3) { usernameStatus.textContent="❌ Min 3 characters" ;
    usernameStatus.className="text-red-600 text-sm mt-1" ; isUsernameValid=false; validateForm(); return; } // If it's
    the original username, it's valid if (username==="{{ user.username }}" ) {
    usernameStatus.textContent="✅ Current username" ; usernameStatus.className="text-blue-600 text-sm mt-1" ;
    isUsernameValid=true; validateForm(); return; } const response=await fetch("{% url 'check-username' %}", {
    method: "POST" , headers: { "Content-Type" : "application/json" , "X-CSRFToken" : getCookie('csrftoken'), }, body:
    JSON.stringify({ username }), }); const data=await response.json(); if (data.exists) {
    usernameStatus.textContent="❌ Username already taken" ; usernameStatus.className="text-red-600 text-sm mt-1" ;
    isUsernameValid=false; } else { usernameStatus.textContent="✅ Username available" ;
    isUsernameValid=true; } validateForm(); }); countryCode();
</script>
    </script>
    {% endblock %}
