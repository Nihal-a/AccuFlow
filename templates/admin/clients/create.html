{% extends 'base.html' %}
{% block title %}Clients{% endblock %}
{% block externalCSS %}
<style>
  /* Remove number input arrows */
  input.no-spinners::-webkit-outer-spin-button,
  input.no-spinners::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input.no-spinners {
    -moz-appearance: textfield;
    appearance: textfield;
  }
</style>
{% endblock %} {% block content %}
<div class="bg-white sm:rounded-xl p-4 sm:p-6 mt-3 sm:mt-5 mx-0 sm:mx-0 w-full max-w-full font-sans">
  <div class="flex flex-col flex-wrap border-b border-gray-200 pb-4">
    <h1 class="text-xl sm:text-2xl font-medium mb-0 text-gray-700 uppercase">
      Create Client
    </h1>
  </div>
  <div class="mt-4 sm:mt-5 w-full">
    <form method="post" action="{% url 'create-client' %}" class="flex flex-col gap-3 sm:gap-4 ignore-unsaved-changes">
      {% csrf_token %}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Name*</label>
          <input type="text" placeholder="Enter customer name..." name="name"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm input-text-only"
            required />
        </div>
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Email</label>
          <input type="email" placeholder="Enter Email Address..." name="email"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm" />
        </div>
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Phone</label>
          <input type="number" placeholder="Enter phone number..." name="phone"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm no-spinners input-number-only" />
        </div>
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Whatsapp No.</label>
          <div class="flex">
            <select name="country_code"
              class="w-[40%] bg-white px-1 sm:px-2 h-[32px] sm:h-[34px] border border-gray-300 rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm"
              id="countryCode"></select>

            <input type="tel" name="wa" placeholder="Enter whatsapp number..."
              class="w-[60%] bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border-t border-b border-r border-gray-300 rounded-r-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm no-spinners input-number-only"
              inputmode="numeric" pattern="[0-9]*" />
          </div>
        </div>
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Subscription Plan</label>
          <select name="subscription_plan"
            class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm">
            <option value="">Select a Plan...</option>
            {% for plan in plans %}
            <option value="{{ plan.id }}">
              {{ plan.name }} ({{ plan.duration_days }} days)
              {% if plan.is_trial %} [TRIAL]{% endif %}
            </option>
            {% endfor %}
          </select>
          <input type="number" name="custom_duration" placeholder="Custom Days (Optional)"
            class="w-full mt-2 bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm input-number-only no-spinners"
            title="Override plan duration">
        </div>
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Username*</label>
          <div class="relative">
            <input type="text" id="usernameInput" name="username" placeholder="Enter Username"
              class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm pr-20"
              required />
            <span id="usernameStatus" class="absolute right-2 top-2 text-[10px] sm:text-xs"></span>
          </div>
        </div>
        <div>
          <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">WhatsApp Automation</label>
          <div class="flex items-center space-x-2 mt-2">
            <input type="checkbox" name="has_whatsapp_access" id="has_whatsapp_access"
              class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
            <label for="has_whatsapp_access" class="text-sm text-gray-700">Enable WhatsApp Automation features</label>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Password*</label>
            <div class="relative">
              <input type="password" id="passwordInput" name="password" placeholder="Enter Password"
                class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm pr-10"
                required />
              <button type="button" id="togglePassword" class="absolute right-2 top-1.5 sm:top-2 text-sm text-gray-500">
                👁️
              </button>
            </div>
            <small id="passwordStrength" class="text-xs text-gray-500"></small>
          </div>

          <div>
            <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Confirm Password*</label>
            <div class="relative">
              <input type="password" id="confirmPasswordInput" name="confirm_password"
                placeholder="Enter Confirm Password"
                class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs sm:text-sm pr-10"
                required />
              <button type="button" id="toggleConfirmPassword"
                class="absolute right-2 top-1.5 sm:top-2 text-sm text-gray-500">
                👁️
              </button>
            </div>
            <small id="passwordMatch" class="text-xs"></small>
          </div>
        </div>
      </div>
      <div class="mt-4 sm:mt-6 flex flex-wrap gap-2 justify-end">
        <a href="{% url 'clients'%}"
          class="leading-none inline-flex items-center gap-1.5 bg-red-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-red-600 transition-all duration-300 text-xs sm:text-sm">Cancel</a>
        <button type="submit" id="submitBtn"
          class="leading-none inline-flex items-center gap-1.5 bg-blue-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-blue-600 transition-all duration-300 text-xs sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed">
          Create Client
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block externalJS %}
<script>
  const submitBtn = document.getElementById('submitBtn');
  let isUsernameValid = false;
  let isPasswordValid = false;
  let isPasswordMatch = false;

  function validateForm() {
    submitBtn.disabled = !(isUsernameValid && isPasswordValid && isPasswordMatch);
  }

  usernameInput.addEventListener('input', async () => {
    const username = usernameInput.value.trim();
    if (username.length < 3) {
      usernameStatus.textContent = '❌ Min 3 characters';
      usernameStatus.className = 'absolute right-3 top-3 text-red-600 text-[10px]';
      isUsernameValid = false;
      validateForm();
      return;
    }

    const response = await fetch("{% url 'check-username' %}", {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken'),
      },
      body: JSON.stringify({ username }),
    });

    const data = await response.json();
    if (data.available) {
      usernameStatus.textContent = '✅ Available';
      usernameStatus.className = 'absolute right-3 top-3 text-green-600 text-[10px]';
      isUsernameValid = true;
    } else {
      usernameStatus.textContent = '❌ Taken';
      usernameStatus.className = 'absolute right-3 top-3 text-red-600 text-[10px]';
      isUsernameValid = false;
    }
    validateForm();
  });

  const passwordInput = document.getElementById('passwordInput');
  const confirmPasswordInput = document.getElementById('confirmPasswordInput');
  const passwordStrength = document.getElementById('passwordStrength');
  const passwordMatch = document.getElementById('passwordMatch');
  const togglePassword = document.getElementById('togglePassword');
  const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

  function toggleVisibility(input, icon) {
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = '🙈';
    } else {
      input.type = 'password';
      icon.textContent = '👁️';
    }
  }
  togglePassword.addEventListener('click', () => toggleVisibility(passwordInput, togglePassword));
  toggleConfirmPassword.addEventListener('click', () => toggleVisibility(confirmPasswordInput, toggleConfirmPassword));

  passwordInput.addEventListener('input', () => {
    const val = passwordInput.value;
    const commonPasswords = ["12345678", "password", "qwertyui", "123456789", "11223344"];

    let strength = '', color = 'text-red-500';
    isPasswordValid = false;

    if (val.length === 0) {
      strength = '';
    } else if (val.length < 8) {
      strength = 'Too Short (Min 8 characters)'; color = 'text-red-500';
    } else if (/^\d+$/.test(val)) {
      strength = 'This password is entirely numeric.'; color = 'text-red-500';
    } else if (commonPasswords.includes(val.toLowerCase())) {
      strength = 'This password is too common.'; color = 'text-red-500';
    } else {
      isPasswordValid = true;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val) && /\d/.test(val) && /[@$!%*?&#]/.test(val)) {
        strength = 'Strong password'; color = 'text-green-600';
      } else {
        strength = 'Medium password'; color = 'text-yellow-500';
      }
    }

    passwordStrength.textContent = strength;
    passwordStrength.className = 'text-xs ' + color;

    // Check match again if confirm has value
    isPasswordMatch = confirmPasswordInput.value === val && val.length > 0;
    validateForm();
  });

  confirmPasswordInput.addEventListener('input', () => {
    if (confirmPasswordInput.value === passwordInput.value && passwordInput.value.length > 0) {
      passwordMatch.textContent = '✅ Passwords match';
      passwordMatch.className = 'text-green-600 text-xs';
      isPasswordMatch = true;
    } else {
      passwordMatch.textContent = '❌ Passwords do not match';
      passwordMatch.className = 'text-red-600 text-xs';
      isPasswordMatch = false;
    }
    validateForm();
  });

  validateForm(); // Initial check
  countryCode();
</script>
{% endblock %}
