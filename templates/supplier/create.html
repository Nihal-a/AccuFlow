{% extends 'base.html' %}

{% block title %}Suppliers{% endblock %}

{% block externalCSS %}
<style>
    /* Remove number input arrows */
    input.no-spinners::-webkit-outer-spin-button,
    input.no-spinners::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    input.no-spinners {
        -moz-appearance: textfield;
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-white sm:rounded-xl p-4 sm:p-6 mt-3 sm:mt-5 w-full max-w-full font-sans">
  <div class="flex flex-col flex-wrap border-b border-gray-200 pb-4">
    <h1 class="text-xl sm:text-2xl font-medium mb-0 text-gray-700 uppercase">Create Supplier</h1>
  </div>
  <div class="mt-4 sm:mt-5 w-full">
    <form method="post" action="{% url 'create-supplier' %}" class="flex flex-col gap-3 sm:gap-4">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Name*</label>
                <input type="text" name="name" placeholder="Enter supplier name"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm input-text-only"
                    required />
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Address</label>
                <input type="text" name="address" placeholder="Enter address or location"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm" />
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Phone</label>
                <input type="number" name="phone" placeholder="Enter phone number"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners input-number-only" />
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">WhatsApp Number</label>
                <div class="flex">
                    <select name="country_code"
                        class="w-[40%] bg-white px-1 sm:px-2 h-[32px] sm:h-[34px] border border-gray-300 rounded-l-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm"
                        id="countryCode"></select>
                    <input type="tel" name="whatsapp_number" placeholder="Enter WhatsApp number..."
                        class="w-[60%] bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border-t border-b border-r border-gray-300 rounded-r-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners input-number-only"
                        inputmode="numeric" pattern="[0-9]*">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Open Credit*</label>
                <input type="number" step="0.01" name="open_credit" placeholder="Enter opening credit balance"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners"
                    required />
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">Open Debit*</label>
                <input type="number" step="0.01" name="open_debit" placeholder="Enter opening debit balance"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners"
                    required />
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">OTC Credit*</label>
                <input type="number" step="0.01" name="otc_credit" placeholder="Enter on-the-spot credit (if any)"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners"
                    required />
            </div>
            <div>
                <label class="block text-gray-700 mb-1 text-xs sm:text-sm font-medium">OTC Debit*</label>
                <input type="number" step="0.01" name="otc_debit" placeholder="Enter on-the-spot debit (if any)"
                    class="w-full bg-white px-2 sm:px-2.5 h-[32px] sm:h-[34px] border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 text-xs sm:text-sm no-spinners"
                    required />
            </div>
        </div>
        <div class="mt-4 sm:mt-6 flex flex-wrap gap-2 justify-end">
            <a href="{% url 'suppliers'%}"
                class="leading-none inline-flex items-center gap-1.5 bg-red-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-red-600 transition-all duration-300 text-xs sm:text-sm">Cancel</a>
            <button type="submit"
                class="leading-none inline-flex items-center gap-1.5 bg-blue-500 text-white font-medium h-[32px] sm:h-[34px] px-4 sm:px-6 rounded-md shadow-sm hover:bg-blue-600 transition-all duration-300 text-xs sm:text-sm">Create Supplier</button>
        </div>
    </form>
  </div>
</div>

{% endblock %}
{% block externalJS %}
<script>

    navActive("supplierMasterLink");
    countryCode()
</script>
{% endblock %}
