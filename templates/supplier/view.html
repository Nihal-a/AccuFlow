{% extends 'base.html' %}

{% block title %}Supplier Details{% endblock %}

{% block externalCSS %}
{% endblock %}

{% block content %}
<div class="bg-white shadow rounded-xl p-6 w-full">
    <div class="flex items-center justify-between mb-6 border-b-2 border-gray-200 pb-4">
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 tracking-tight">Supplier Details</h1>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-gray-700">Name</label>
            <input type="text" value="{{ supplier.name }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
        <div>
            <label class="block text-gray-700">Address</label>
            <input type="text" value="{{ supplier.address }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
        <div>
            <label class="block text-gray-700">Phone</label>
            <input type="text" value="{{ supplier.phone }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
        <div>
            <label class="block text-gray-700">WhatsApp Number</label>
            <div class="flex mt-1">
                <select class="border rounded-l-xl px-3 py-2 bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed" id="countryCode" disabled>
                </select>
                <input type="tel" value="{{ supplier.wa | default:'N/A' }}"
                    class="w-full px-3 py-2 border-t border-b border-r rounded-r-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                    disabled readonly>
            </div>
        </div>
        <div>
            <label class="block text-gray-700">Open Credit</label>
            <input type="text" value="{{ supplier.open_credit }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
        <div>
            <label class="block text-gray-700">Open Debit</label>
            <input type="text" value="{{ supplier.open_debit }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
        <div>
            <label class="block text-gray-700">OTC Credit</label>
            <input type="text" value="{{ supplier.otc_credit }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
        <div>
            <label class="block text-gray-700">OTC Debit</label>
            <input type="text" value="{{ supplier.otc_debit }}"
                class="w-full mt-1 px-3 py-2 border rounded-xl bg-gray-50 text-gray-600 focus:outline-none cursor-not-allowed"
                disabled readonly>
        </div>
    </div>
    <div class="mt-6 flex justify-end">
        <a href="{% url 'suppliers' %}"
            class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 font-semibold transition-colors">
            Back to Suppliers
        </a>
    </div>
</div>

{% endblock %}
{% block externalJS %}
<script>
    navActive("supplierMasterLink");
    countryCode();
    $('#countryCode').val("{{ supplier.country_code }}").trigger('change');
</script>
{% endblock %}
