{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://unpkg.com/tailwindcss@^2.0/dist/tailwind.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', 'Roboto', 'Segoe UI', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4 m-0 overflow-hidden text-gray-800">
    <div class="text-center bg-white p-10 md:p-14 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100">
        <div class="relative inline-block mb-8">
            <h1
                class="text-9xl font-extrabold text-blue-500 opacity-10 pointer-events-none select-none tracking-tighter shadow-sm">
                404</h1>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full">
                <div class="flex justify-center mb-4">
                    <div class="p-4 bg-blue-50 rounded-full shadow-inner">
                        <svg class="w-12 h-12 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7" />
                        </svg>
                    </div>
                </div>
                <h2 class="text-3xl font-bold whitespace-nowrap">Oops! Page not found.</h2>
            </div>
        </div>

        <p class="text-gray-500 max-w-md mx-auto mb-10 text-lg">
            The page you're looking for doesn't exist or has been moved.
            If you were trying to access a protected resource, you might not have permission.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="javascript:history.back()"
                class="inline-flex items-center justify-center gap-2 h-12 px-8 font-medium text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 hover:border-gray-400 transition-all shadow-sm focus:ring-2 focus:ring-gray-200">
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Go Back
            </a>

            <a href="{% if user.is_authenticated %}{% if user.is_admin %}{% url 'admin_dashboard' %}{% else %}{% url 'dashboard' %}{% endif %}{% else %}{% url 'login' %}{% endif %}"
                class="inline-flex items-center justify-center gap-2 h-12 px-8 font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-all shadow-md focus:ring-2 focus:ring-blue-400 focus:ring-offset-1">
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Return Home
            </a>
        </div>

        <div class="mt-16 text-gray-400">
            <p class="text-sm">If you believe this is an error, please contact support.</p>
        </div>
    </div>
</body>

</html>
