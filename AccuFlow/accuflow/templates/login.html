{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        input::placeholder,
        textarea::placeholder {
            font-size: 0.805rem; /* text-sm */
            color: #9ca3af;      /* gray-400 (optional) */
        }
    </style>

    <title>Login</title>
     <link
      href="https://unpkg.com/tailwindcss@^2.0/dist/tailwind.min.css"
      rel="stylesheet"
    />
</head>

<body class="min-h-screen overflow-hidden flex items-center justify-center bg-gray-100 m-0">
    <div class="bg-white bg-opacity-90 backdrop-blur-sm shadow-lg rounded-2xl md:w-3/5 sm:w-3/5 w-2/3 max-w-lg p-8 text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-1">AccuFlow</h1>
        <p class="text-gray-600 text-xs md:text-md mb-6">Please enter your username and password to login!</p>

        <form action="{% url 'login' %}" method="post" class="text-left">  
            {% csrf_token %}
            <div class="mb-4">
                <label for="username" class="block text-xs font-semibold text-gray-700 mb-1">
                    Username*
                </label>

                <div class="relative">
                    <!-- Left icon -->
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                        <!-- User icon -->
                        <svg class="w-4 h-4"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0
                                    3.75 3.75 0 0 1 7.5 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M4.5 20.25a7.5 7.5 0 0 1 15 0"/>
                        </svg>
                    </span>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="w-full pl-9 pr-3 py-1 sm-placeholder border border-gray-300 rounded-md
                            focus:outline-none focus:ring-1 focus:ring-blue-500"
                        placeholder="Enter your username"
                        required
                    >
                </div>
            </div>


            <div class="mb-6">
                <label for="password" class="block text-xs font-semibold text-gray-700 mb-1">
                    Password*
                </label>

                <div class="relative">
                    <!-- Left icon -->
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                        <!-- Lock icon -->
                        <svg class="w-4 h-4"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.5 10.5V7.5a4.5 4.5 0 1 0-9 0v3"/>
                            <rect x="6.75" y="10.5" width="10.5" height="9" rx="1.5"/>
                        </svg>
                    </span>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="w-full pl-9 pr-3 py-1 border border-gray-300 rounded-md
                            focus:outline-none focus:ring-1 focus:ring-blue-500"
                        placeholder="Enter your password"
                        required
                    >

                    <!-- Eye toggle (right) -->
                    <button
                        type="button"
                        onclick="togglePassword(this)"
                        class="absolute inset-y-0 right-2 flex items-center gap-1 text-sm
                            text-gray-500 hover:text-gray-700"
                    >
                        <!-- eye open -->
                        <svg class="eye-open w-5 h-5"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.25 12s3.75-6.75 9.75-6.75S21.75 12 21.75 12
                                    18 18.75 12 18.75 2.25 12 2.25 12z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>

                        <!-- eye closed -->
                        <svg class="eye-closed w-5 h-5 hidden"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 3l18 18"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M10.7 5.1C11.1 5 11.5 5 12 5
                                    c6 0 9.75 7 9.75 7
                                    a18.3 18.3 0 0 1-4.1 4.9"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M6.3 6.3C3.6 8.4 2.25 12 2.25 12
                                    s3.75 6.75 9.75 6.75
                                    c1.1 0 2.1-.2 3-.5"/>
                        </svg>
                    </button>
                </div>
            </div>




            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-500 text-white text-sm font-semibold py-1.5 rounded-md transition duration-200">
                Log In
            </button>
        </form>
    </div>
</body>
    <script>
        function togglePassword(btn) {
            const input = document.getElementById("password");
            const eyeOpen = btn.querySelector(".eye-open");
            const eyeClosed = btn.querySelector(".eye-closed");
            const text = btn.querySelector(".toggle-text");

            if (input.type === "password") {
                input.type = "text";
                eyeOpen.classList.add("hidden");
                eyeClosed.classList.remove("hidden");
            } else {
                input.type = "password";
                eyeClosed.classList.add("hidden");
                eyeOpen.classList.remove("hidden");
                text.textContent = "Show";
            }
        }
    </script>
</html>
