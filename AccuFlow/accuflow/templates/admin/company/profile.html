{% extends 'base.html' %}
{% block title %}Company Profile{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-8 border-b border-gray-50 bg-gradient-to-r from-blue-50 to-white">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div
                        class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg">
                        <i data-lucide="building-2" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Company Profile</h1>
                        <p class="text-gray-500">Manage your business identity and support information</p>
                    </div>
                </div>
            </div>
        </div>

        <form method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-full">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Company
                        Logo</label>
                    <div class="flex items-center gap-6">
                        {% if company.logo %}
                        <img src="{{ company.logo.url }}" alt="Logo"
                            class="w-24 h-24 object-contain rounded-xl border border-gray-100 p-2 bg-gray-50">
                        {% else %}
                        <div
                            class="w-24 h-24 bg-gray-50 border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center text-gray-400">
                            <i data-lucide="image" class="w-8 h-8"></i>
                        </div>
                        {% endif %}
                        <div class="flex-1">
                            <input type="file" name="logo"
                                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all">
                            <p class="mt-2 text-xs text-gray-400">Recommended size: 512x512px. JPG, PNG or SVG.</p>
                        </div>
                    </div>
                </div>

                <div class="col-span-full">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Company
                        Name</label>
                    <input type="text" name="name" value="{{ company.name|default:'AccuFlow' }}" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                </div>

                <div class="col-span-full">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Description /
                        About</label>
                    <textarea name="description" rows="3"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">{{ company.description|default:'' }}</textarea>
                </div>

                <div class="col-span-full">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Office
                        Address</label>
                    <textarea name="address" rows="2"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">{{ company.address|default:'' }}</textarea>
                </div>

                <div class="col-span-full md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Website
                        URL</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="globe" class="w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="url" name="website" value="{{ company.website|default:'' }}"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
                            placeholder="https://example.com">
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-100 flex justify-end gap-4">
                <button type="submit"
                    class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
