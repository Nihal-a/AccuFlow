{% extends 'base.html' %} 
{% block title %}Clients{% endblock %} 
{% block externalCSS %}
<style>
  /* Remove number input arrows */
  input.no-spinners::-webkit-outer-spin-button,
  input.no-spinners::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input.no-spinners {
    -moz-appearance: textfield;
  }
</style>
{% endblock %} {% block content %}
<h1 class="text-3xl font-bold mb-4 text-gray-700">Create Client</h1>
<div class="bg-white rounded-xl p-6">
  <form method="post" action="{% url 'create-client' %}">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-700">Name*</label>
        <input
          type="text"
          placeholder="Enter customer name..."
          name="name"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>
      <div>
        <label class="block text-gray-700">Email</label>
        <input
          type="text"
          placeholder="Enter Email Address..."
          name="email"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div>
        <label class="block text-gray-700">Phone</label>
        <input
          type="number"
          placeholder="Enter phone number..."
          name="phone"
          class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        />
      </div>
      <div>
        <label class="block text-gray-700">Whatsapp No.</label>
        <div class="flex mt-1">
          <select
            name="country_code"
            class="border rounded-l-xl px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            id="countryCode"
          ></select>

          <input
            type="tel"
            name="wa"
            placeholder="Enter whatsapp number..."
            class="w-full px-3 py-2 border-t border-b border-r rounded-r-xl focus:outline-none focus:ring-2 focus:ring-blue-500 no-spinners"
            inputmode="numeric"
            pattern="[0-9]*"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
          />
        </div>
      </div>
      <div>
        <label class="block text-gray-700">Username*</label>
        <div class="relative">
          <input
            type="text"
            id="usernameInput"
            name="username"
            placeholder="Enter Username"
            class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
          <span
            id="usernameStatus"
            class="absolute right-3 top-3 text-sm"
          ></span>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-gray-700">Password*</label>
          <div class="relative">
            <input
              type="password"
              id="passwordInput"
              name="password"
              placeholder="Enter Password"
              class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-3 text-gray-500"
            >
              👁️
            </button>
          </div>
          <small id="passwordStrength" class="text-sm text-gray-500"></small>
        </div>

        <div>
          <label class="block text-gray-700">Confirm Password*</label>
          <div class="relative">
            <input
              type="password"
              id="confirmPasswordInput"
              name="confirm_password"
              placeholder="Enter Confirm Password"
              class="w-full mt-1 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
            <button
              type="button"
              id="toggleConfirmPassword"
              class="absolute right-3 top-3 text-gray-500"
            >
              👁️
            </button>
          </div>
          <small id="passwordMatch" class="text-sm"></small>
        </div>
      </div>
    </div>
    <div class="mt-6 flex gap-2 justify-end">
      <a
        href="{% url 'clients'%}"
        type="submit"
        class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 font-semibold"
        >Cancel</a
      >
      <button
        type="submit"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 font-semibold"
      >
        Create Clients
      </button>
    </div>
  </form>
</div>
{% endblock %} 

{% block externalJS %}
<script>
  const usernameInput = document.getElementById('usernameInput');
  const usernameStatus = document.getElementById('usernameStatus');

  usernameInput.addEventListener('input', async () => {
    const username = usernameInput.value.trim();
    if (username.length < 3) {
      usernameStatus.textContent = '';
      return;
    }

    const response = await fetch("{% url 'check-username' %}", {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token }}',
      },
      body: JSON.stringify({ username }),
    });

    const data = await response.json();
    if (data.available) {
      usernameStatus.textContent = '✅ Available';
      usernameStatus.className = 'absolute right-3 top-3 text-green-600 text-sm';
    } else {
      usernameStatus.textContent = '❌ Taken';
      usernameStatus.className = 'absolute right-3 top-3 text-red-600 text-sm';
    }
  });

  const passwordInput = document.getElementById('passwordInput');
  const confirmPasswordInput = document.getElementById('confirmPasswordInput');
  const passwordStrength = document.getElementById('passwordStrength');
  const passwordMatch = document.getElementById('passwordMatch');
  const togglePassword = document.getElementById('togglePassword');
  const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

  function toggleVisibility(input, icon) {
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = '🙈';
    } else {
      input.type = 'password';
      icon.textContent = '👁️';
    }
  }
  togglePassword.addEventListener('click', () => toggleVisibility(passwordInput, togglePassword));
  toggleConfirmPassword.addEventListener('click', () => toggleVisibility(confirmPasswordInput, toggleConfirmPassword));

  passwordInput.addEventListener('input', () => {
    const val = passwordInput.value;
    let strength = 'Weak', color = 'text-red-500';
    if (val.length >= 8 && /[A-Z]/.test(val) && /[a-z]/.test(val) && /\d/.test(val) && /[@$!%*?&#]/.test(val)) {
      strength = 'Strong'; color = 'text-green-600';
    } else if (val.length >= 6) {
      strength = 'Medium'; color = 'text-yellow-500';
    }
    passwordStrength.textContent = strength + ' password';
    passwordStrength.className = 'text-sm ' + color;
  });

  confirmPasswordInput.addEventListener('input', () => {
    if (confirmPasswordInput.value === passwordInput.value) {
      passwordMatch.textContent = '✅ Passwords match';
      passwordMatch.className = 'text-green-600 text-sm';
    } else {
      passwordMatch.textContent = '❌ Passwords do not match';
      passwordMatch.className = 'text-red-600 text-sm';
    }
  });

  countryCode();
</script>
{% endblock %}
