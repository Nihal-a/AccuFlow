<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Report{% endblock %}</title>
    <style>
        @page {
            size: A4;
            margin: 1cm;
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 10pt;
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 18pt;
            text-transform: uppercase;
            color: #444;
        }

        .header p {
            margin: 5px 0;
            font-size: 10pt;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
            font-weight: bold;
            font-size: 9pt;
        }

        td {
            font-size: 9pt;
        }

        .text-right {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        .footer {
            margin-top: 20px;
            text-align: right;
            font-size: 8pt;
            color: #888;
        }

        .total-row {
            font-weight: bold;
            background-color: #eee;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>{% block report_title %}Report{% endblock %}</h1>
        <p>{% block report_date %}{{ date|date:"d-m-Y" }}{% endblock %}</p>
        <p>{% block company_name %}AccuFlow{% endblock %}</p>
    </div>

    {% block content %}{% endblock %}

    <div class="footer">
        Generated on: {% now "d-m-Y h:i A" %}
    </div>
</body>

</html>
